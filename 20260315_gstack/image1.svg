<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modeGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modeGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="modeGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc"/>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1e293b">gstack 8 种认知模式</text>

  <!-- Center Circle - Programmer -->
  <circle cx="400" cy="300" r="70" fill="url(#centerGrad)" filter="url(#shadow)"/>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="white">程序员</text>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="white" opacity="0.9">AI 助手</text>

  <!-- Mode 1: CEO Review (top-left) -->
  <circle cx="250" cy="180" r="55" fill="url(#modeGrad1)" filter="url(#shadow)"/>
  <text x="250" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/plan-ceo-review</text>
  <text x="250" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">创始人视角</text>
  <line x1="295" y1="215" x2="355" y2="265" stroke="#ec4899" stroke-width="2" opacity="0.4"/>

  <!-- Mode 2: Eng Review (top-right) -->
  <circle cx="550" cy="180" r="55" fill="url(#modeGrad2)" filter="url(#shadow)"/>
  <text x="550" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/plan-eng-review</text>
  <text x="550" y="188" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">技术架构</text>
  <line x1="505" y1="215" x2="445" y2="265" stroke="#10b981" stroke-width="2" opacity="0.4"/>

  <!-- Mode 3: Review (left) -->
  <circle cx="180" cy="300" r="55" fill="url(#modeGrad3)" filter="url(#shadow)"/>
  <text x="180" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/review</text>
  <text x="180" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">代码审查</text>
  <line x1="235" y1="300" x2="330" y2="300" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>

  <!-- Mode 4: Ship (right) -->
  <circle cx="620" cy="300" r="55" fill="url(#modeGrad4)" filter="url(#shadow)"/>
  <text x="620" y="295" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/ship</text>
  <text x="620" y="313" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">发布执行</text>
  <line x1="565" y1="300" x2="470" y2="300" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <!-- Mode 5: Browse (bottom-left) -->
  <circle cx="250" cy="420" r="55" fill="url(#modeGrad1)" filter="url(#shadow)"/>
  <text x="250" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/browse</text>
  <text x="250" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">浏览器自动化</text>
  <line x1="295" y1="385" x2="355" y2="335" stroke="#ec4899" stroke-width="2" opacity="0.4"/>

  <!-- Mode 6: QA (bottom-right) -->
  <circle cx="550" cy="420" r="55" fill="url(#modeGrad2)" filter="url(#shadow)"/>
  <text x="550" y="410" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">/qa</text>
  <text x="550" y="428" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="white" opacity="0.9">QA 测试</text>
  <line x1="505" y1="385" x2="445" y2="335" stroke="#10b981" stroke-width="2" opacity="0.4"/>

  <!-- Mode 7: Setup Cookies (bottom) -->
  <circle cx="320" cy="480" r="45" fill="url(#modeGrad3)" filter="url(#shadow)"/>
  <text x="320" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" font-weight="bold" fill="white">/setup-browser</text>
  <text x="320" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="white" opacity="0.9">会话管理</text>
  <line x1="345" y1="445" x2="375" y2="365" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>

  <!-- Mode 8: Retro (bottom) -->
  <circle cx="480" cy="480" r="45" fill="url(#modeGrad4)" filter="url(#shadow)"/>
  <text x="480" y="475" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="white">/retro</text>
  <text x="480" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="8" fill="white" opacity="0.9">团队复盘</text>
  <line x1="455" y1="445" x2="425" y2="365" stroke="#3b82f6" stroke-width="2" opacity="0.4"/>

  <!-- Connection lines from center -->
  <line x1="400" y1="230" x2="400" y2="210" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4"/>
  <line x1="400" y1="370" x2="400" y2="390" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4"/>

  <!-- Legend -->
  <rect x="50" y="530" width="700" height="50" rx="8" fill="#f1f5f9"/>
  <text x="400" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#475569">认知模式切换</text>
  <text x="400" y="568" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#64748b">用 8 个斜杠命令告诉模型"现在需要你用什么脑子"</text>
</svg>
