<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f87171"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#f8fafc">浏览器自动化性能对比</text>
  <text x="400" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">gstack vs MCP 工具：响应时间与上下文开销</text>

  <!-- Left: Architecture -->
  <g transform="translate(30, 75)">
    <text x="160" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">gstack 架构</text>

    <rect x="0" y="15" width="320" height="160" rx="10" fill="rgba(16,185,129,0.1)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- Flow boxes -->
    <rect x="20" y="30" width="280" height="35" rx="6" fill="url(#greenGrad)"/>
    <text x="160" y="53" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">编译型 CLI</text>

    <path d="M 160 70 L 160 85" stroke="#10b981" stroke-width="2"/>
    <polygon points="160,90 155,80 165,80" fill="#10b981"/>

    <rect x="20" y="95" width="280" height="35" rx="6" fill="#059669"/>
    <text x="160" y="118" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="white">持久化 Chromium 守护进程</text>

    <path d="M 160 135 L 160 145" stroke="#10b981" stroke-width="2"/>
    <polygon points="160,150 155,140 165,140" fill="#10b981"/>

    <rect x="50" y="155" width="220" height="28" rx="4" fill="#d1fae5"/>
    <text x="160" y="174" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#065f46">0 tokens 上下文开销</text>
  </g>

  <!-- Right: Performance Chart -->
  <g transform="translate(380, 75)">
    <text x="185" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">首次调用耗时对比</text>

    <rect x="0" y="15" width="370" height="160" rx="10" fill="rgba(239,68,68,0.1)" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>

    <!-- Y-axis labels -->
    <text x="25" y="50" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Chrome MCP</text>
    <text x="25" y="90" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">Playwright</text>
    <text x="25" y="130" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">gstack(首次)</text>
    <text x="25" y="160" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">gstack(后续)</text>

    <!-- Bars -->
    <rect x="95" y="38" width="260" height="20" rx="3" fill="url(#redGrad)"/>
    <text x="365" y="52" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#ef4444">~5s</text>

    <rect x="95" y="78" width="156" height="20" rx="3" fill="url(#orangeGrad)"/>
    <text x="260" y="92" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#f59e0b">~3s</text>

    <rect x="95" y="118" width="156" height="20" rx="3" fill="url(#greenGrad)" opacity="0.7"/>
    <text x="260" y="132" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#10b981">~3s</text>

    <rect x="95" y="150" width="10" height="15" rx="2" fill="url(#greenGrad)"/>
    <text x="115" y="162" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#10b981">~100ms</text>
  </g>

  <!-- Comparison Table -->
  <g transform="translate(30, 265)">
    <text x="370" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">上下文开销对比 (tokens)</text>

    <rect x="0" y="15" width="740" height="100" rx="10" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="1" filter="url(#shadow)"/>

    <!-- Header -->
    <rect x="0" y="15" width="740" height="28" rx="10" fill="rgba(255,255,255,0.05)"/>
    <text x="120" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1">工具</text>
    <text x="300" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1">首次调用</text>
    <text x="450" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1">后续调用</text>
    <text x="620" y="34" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#cbd5e1">上下文开销</text>

    <line x1="0" y1="43" x2="740" y2="43" stroke="rgba(255,255,255,0.1)"/>

    <!-- Row 1 -->
    <text x="120" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Chrome MCP</text>
    <text x="300" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">~5s</text>
    <text x="450" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">~2-5s</text>
    <text x="620" y="65" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#ef4444">~2000 tokens</text>

    <line x1="20" y1="73" x2="720" y2="73" stroke="rgba(255,255,255,0.05)"/>

    <!-- Row 2 -->
    <text x="120" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">Playwright MCP</text>
    <text x="300" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">~3s</text>
    <text x="450" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#94a3b8">~1-3s</text>
    <text x="620" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f59e0b">~1500 tokens</text>

    <!-- Row 3 - Highlighted -->
    <rect x="0" y="98" width="740" height="28" rx="0" fill="rgba(16,185,129,0.1)"/>
    <text x="120" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#10b981">gstack browse</text>
    <text x="300" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">~3s</text>
    <text x="450" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#10b981">~100-200ms</text>
    <text x="620" y="117" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#10b981">0 tokens</text>
  </g>

  <!-- Cost Comparison -->
  <rect x="30" y="390" width="740" height="80" rx="10" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1" filter="url(#shadow)"/>

  <text x="400" y="415" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#fcd34d">20 次命令会话成本对比</text>

  <g transform="translate(100, 430)">
    <rect x="0" y="0" width="150" height="30" rx="6" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
    <text x="75" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#ef4444">MCP: 3-4万 tokens</text>
  </g>

  <text x="300" y="450" font-family="system-ui, sans-serif" font-size="16" fill="#64748b">→</text>

  <g transform="translate(330, 430)">
    <rect x="0" y="0" width="150" height="30" rx="6" fill="rgba(16,185,129,0.3)" stroke="#10b981" stroke-width="1.5"/>
    <text x="75" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#10b981">gstack: 0 tokens</text>
  </g>

  <text x="530" y="450" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">节省 100% 上下文开销</text>
</svg>