<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#238636;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="boxGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f6feb;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="boxGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#9333ea;stop-opacity:0.1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">gstack 浏览器自动化架构</text>
  <text x="400" y="62" text-anchor="middle" fill="#8b949e" font-size="13" font-family="system-ui, -apple-system, sans-serif">编译型 CLI + 持久化 Chromium 守护进程</text>

  <!-- Left Side: User Flow -->
  <g transform="translate(40, 100)">
    <text x="0" y="0" fill="#ffffff" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">用户工作流</text>

    <!-- Command Box -->
    <rect x="0" y="20" width="280" height="60" rx="8" fill="url(#boxGradient1)" stroke="#238636" stroke-width="1.5"/>
    <text x="20" y="45" fill="#7ee787" font-size="12" font-family="monospace">/browse --diff</text>
    <text x="20" y="65" fill="#8b949e" font-size="11" font-family="system-ui, -apple-system, sans-serif">编译型 CLI，零上下文开销</text>

    <!-- Arrow -->
    <path d="M 140 85 L 140 110" stroke="#30363d" stroke-width="2" stroke-dasharray="4,4"/>
    <polygon points="140,120 134,110 146,110" fill="#30363d"/>

    <!-- CLI Box -->
    <rect x="0" y="125" width="280" height="70" rx="8" fill="url(#boxGradient2)" stroke="#1f6feb" stroke-width="1.5"/>
    <text x="20" y="150" fill="#5cacff" font-size="13" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">gstack CLI</text>
    <text x="20" y="170" fill="#8b949e" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 编译为原生二进制</text>
    <text x="20" y="185" fill="#8b949e" font-size="11" font-family="system-ui, -apple-system, sans-serif">• 通过 stdio 与 Claude Code 通信</text>
  </g>

  <!-- Center: Architecture -->
  <g transform="translate(340, 100)">
    <text x="0" y="0" fill="#ffffff" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">核心架构</text>

    <!-- Chromium Daemon -->
    <rect x="0" y="20" width="240" height="120" rx="12" fill="url(#boxGradient3)" stroke="#9333ea" stroke-width="2" filter="url(#glow)"/>
    <text x="120" y="45" text-anchor="middle" fill="#d8b4fe" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">🌐 Chromium 守护进程</text>

    <!-- Internal components -->
    <rect x="20" y="60" width="200" height="30" rx="6" fill="rgba(147,51,234,0.2)" stroke="#9333ea" stroke-width="1"/>
    <text x="110" y="80" text-anchor="middle" fill="#e9d5ff" font-size="11" font-family="system-ui, -apple-system, sans-serif">Playwright 原生 API</text>

    <rect x="20" y="95" width="200" height="30" rx="6" fill="rgba(147,51,234,0.2)" stroke="#9333ea" stroke-width="1"/>
    <text x="110" y="115" text-anchor="middle" fill="#e9d5ff" font-size="11" font-family="system-ui, -apple-system, sans-serif">可访问性树 → ref 映射</text>

    <!-- Arrow to right -->
    <path d="M 245 80 L 275 80" stroke="#30363d" stroke-width="2"/>
    <polygon points="285,80 275,74 275,86" fill="#30363d"/>
  </g>

  <!-- Right Side: Performance -->
  <g transform="translate(560, 100)">
    <text x="0" y="0" fill="#ffffff" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">性能对比</text>

    <!-- Performance Table -->
    <rect x="0" y="20" width="200" height="120" rx="8" fill="rgba(255,255,255,0.03)" stroke="#30363d" stroke-width="1"/>

    <!-- Header -->
    <rect x="0" y="20" width="200" height="25" rx="8" fill="rgba(255,255,255,0.05)"/>
    <text x="100" y="37" text-anchor="middle" fill="#8b949e" font-size="11" font-family="system-ui, -apple-system, sans-serif">工具 · 首次调用 · 上下文</text>

    <!-- Rows -->
    <text x="10" y="65" fill="#8b949e" font-size="10" font-family="monospace">Chrome MCP</text>
    <text x="120" y="65" fill="#f78166" font-size="10" font-family="monospace">~5s</text>
    <text x="160" y="65" fill="#f78166" font-size="10" font-family="monospace">2000 tokens</text>

    <text x="10" y="85" fill="#8b949e" font-size="10" font-family="monospace">Playwright MCP</text>
    <text x="120" y="85" fill="#f78166" font-size="10" font-family="monospace">~3s</text>
    <text x="160" y="85" fill="#f78166" font-size="10" font-family="monospace">1500 tokens</text>

    <text x="10" y="105" fill="#8b949e" font-size="10" font-family="monospace">gstack browse</text>
    <text x="120" y="105" fill="#7ee787" font-size="10" font-weight="bold" font-family="monospace">~100ms</text>
    <text x="155" y="105" fill="#7ee787" font-size="10" font-weight="bold" font-family="monospace">0 tokens</text>

    <!-- Highlight -->
    <rect x="0" y="100" width="200" height="20" rx="4" fill="rgba(35,134,54,0.15)" stroke="none"/>
  </g>

  <!-- Bottom: Key Innovation -->
  <g transform="translate(40, 260)">
    <rect x="0" y="0" width="720" height="100" rx="12" fill="rgba(255,255,255,0.03)" stroke="#30363d" stroke-width="1"/>
    <text x="360" y="25" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">🔑 核心创新：基于 ref 的元素选择</text>

    <!-- Flow diagram -->
    <g transform="translate(30, 40)">
      <!-- Step 1 -->
      <rect x="0" y="0" width="130" height="45" rx="6" fill="rgba(31,111,235,0.15)" stroke="#1f6feb" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#5cacff" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">1. ariaSnapshot()</text>
      <text x="65" y="35" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui, -apple-system, sans-serif">YAML 可访问性树</text>

      <!-- Arrow -->
      <path d="M 135 22 L 155 22" stroke="#30363d" stroke-width="2"/>
      <polygon points="160,22 150,18 150,26" fill="#30363d"/>

      <!-- Step 2 -->
      <rect x="165" y="0" width="130" height="45" rx="6" fill="rgba(147,51,234,0.15)" stroke="#9333ea" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#d8b4fe" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">2. 分配 ref</text>
      <text x="65" y="35" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui, -apple-system, sans-serif">@e1, @e2, ...</text>

      <!-- Arrow -->
      <path d="M 300 22 L 320 22" stroke="#30363d" stroke-width="2"/>
      <polygon points="325,22 315,18 315,26" fill="#30363d"/>

      <!-- Step 3 -->
      <rect x="330" y="0" width="130" height="45" rx="6" fill="rgba(35,134,54,0.15)" stroke="#238636" stroke-width="1"/>
      <text x="65" y="20" text-anchor="middle" fill="#7ee787" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">3. click @e3</text>
      <text x="65" y="35" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui, -apple-system, sans-serif">直接查表调用</text>

      <!-- Arrow -->
      <path d="M 465 22 L 485 22" stroke="#30363d" stroke-width="2"/>
      <polygon points="490,22 480,18 480,26" fill="#30363d"/>

      <!-- Result -->
      <rect x="495" y="0" width="130" height="45" rx="6" fill="rgba(255,255,255,0.05)" stroke="#8b949e" stroke-width="1"/>
      <text x="65" y="25" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">⚡ 100-200ms</text>
      <text x="65" y="40" text-anchor="middle" fill="#8b949e" font-size="10" font-family="system-ui, -apple-system, sans-serif">无 DOM 注入</text>
    </g>
  </g>

  <!-- Bottom: Workspaces -->
  <g transform="translate(40, 380)">
    <text x="0" y="0" fill="#8b949e" font-size="12" font-family="system-ui, -apple-system, sans-serif">多工作空间隔离：</text>

    <rect x="120" y="-12" width="180" height="35" rx="6" fill="rgba(35,134,54,0.1)" stroke="#238636" stroke-width="1"/>
    <text x="210" y="10" text-anchor="middle" fill="#7ee787" font-size="11" font-family="monospace">/code/project-a</text>
    <text x="210" y="25" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">端口：随机 (10000-60000)</text>

    <path d="M 310 5 L 330 5" stroke="#30363d" stroke-width="2"/>
    <polygon points="335,5 325,1 325,9" fill="#30363d"/>

    <rect x="340" y="-12" width="180" height="35" rx="6" fill="rgba(31,111,235,0.1)" stroke="#1f6feb" stroke-width="1"/>
    <text x="430" y="10" text-anchor="middle" fill="#5cacff" font-size="11" font-family="monospace">/code/project-b</text>
    <text x="430" y="25" text-anchor="middle" fill="#8b949e" font-size="10" font-family="monospace">端口：随机 (10000-60000)</text>

    <text x="540" y="12" fill="#238636" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">✓ 无端口冲突</text>
    <text x="640" y="12" fill="#238636" font-size="11" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">✓ 无状态共享</text>
  </g>

  <!-- Footer -->
  <text x="400" y="485" text-anchor="middle" fill="#484f58" font-size="11" font-family="system-ui, -apple-system, sans-serif">20 次命令会话 · MCP 消耗 3-4 万 tokens · gstack 零开销</text>
</svg>
