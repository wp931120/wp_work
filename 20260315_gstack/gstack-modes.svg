<svg viewBox="0 0 800 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626"/>
      <stop offset="100%" style="stop-color:#ef4444"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <linearGradient id="card4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="card5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="800" height="520" fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="42" text-anchor="middle" font-family="system-ui, -apple-system, 'SF Pro Display', sans-serif" font-size="26" font-weight="700" fill="#f8fafc">gstack 8 种认知模式</text>
  <text x="400" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#94a3b8">把 Claude Code 从「通用助手」变成「专家团队」</text>

  <!-- Row 1 -->
  <g transform="translate(30, 95)">
    <!-- Card 1: plan-ceo-review -->
    <rect x="0" y="0" width="175" height="105" rx="10" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="87.5" cy="30" r="16" fill="url(#card1)"/>
    <text x="87.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">C</text>
    <text x="87.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/plan-ceo-review</text>
    <text x="87.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">创始人/CEO</text>
    <text x="87.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">重新定义问题</text>

    <!-- Card 2: plan-eng-review -->
    <rect x="185" y="0" width="175" height="105" rx="10" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="272.5" cy="30" r="16" fill="url(#card2)"/>
    <text x="272.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">E</text>
    <text x="272.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/plan-eng-review</text>
    <text x="272.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">技术负责人</text>
    <text x="272.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">架构设计</text>

    <!-- Card 3: review -->
    <rect x="370" y="0" width="175" height="105" rx="10" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="457.5" cy="30" r="16" fill="url(#card3)"/>
    <text x="457.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">R</text>
    <text x="457.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/review</text>
    <text x="457.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">偏执工程师</text>
    <text x="457.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">找生产级 bug</text>

    <!-- Card 4: ship -->
    <rect x="555" y="0" width="175" height="105" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="642.5" cy="30" r="16" fill="url(#card4)"/>
    <text x="642.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">S</text>
    <text x="642.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/ship</text>
    <text x="642.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">发布工程师</text>
    <text x="642.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">自动化发布</text>
  </g>

  <!-- Row 2 -->
  <g transform="translate(30, 215)">
    <!-- Card 5: browse -->
    <rect x="0" y="0" width="175" height="105" rx="10" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="87.5" cy="30" r="16" fill="url(#card5)"/>
    <text x="87.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">B</text>
    <text x="87.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/browse</text>
    <text x="87.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">QA 工程师</text>
    <text x="87.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">60 秒完成测试</text>

    <!-- Card 6: qa -->
    <rect x="185" y="0" width="175" height="105" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="272.5" cy="30" r="16" fill="url(#card4)"/>
    <text x="272.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">Q</text>
    <text x="272.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/qa</text>
    <text x="272.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">QA 负责人</text>
    <text x="272.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">系统级验证</text>

    <!-- Card 7: setup-browser -->
    <rect x="370" y="0" width="175" height="105" rx="10" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="457.5" cy="30" r="16" fill="url(#card3)"/>
    <text x="457.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">K</text>
    <text x="457.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#f1f5f9">/setup-browser</text>
    <text x="457.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">会话管理</text>
    <text x="457.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">导入 cookies</text>

    <!-- Card 8: retro -->
    <rect x="555" y="0" width="175" height="105" rx="10" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
    <circle cx="642.5" cy="30" r="16" fill="url(#card2)"/>
    <text x="642.5" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="white">T</text>
    <text x="642.5" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#f1f5f9">/retro</text>
    <text x="642.5" y="76" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#cbd5e1">工程经理</text>
    <text x="642.5" y="92" text-anchor="middle" font-family="system-ui, sans-serif" font-size="9" fill="#64748b">团队周报</text>
  </g>

  <!-- Flow Section -->
  <rect x="30" y="340" width="740" height="85" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <text x="400" y="365" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#94a3b8">工作流</text>

  <!-- Flow arrows -->
  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="80" height="30" rx="6" fill="#ef4444"/>
    <text x="40" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">规划</text>

    <path d="M 90 15 L 110 15" stroke="#475569" stroke-width="2" fill="none"/>
    <polygon points="110,15 105,10 105,20" fill="#475569"/>

    <rect x="120" y="0" width="80" height="30" rx="6" fill="#3b82f6"/>
    <text x="160" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">工程</text>

    <path d="M 210 15 L 230 15" stroke="#475569" stroke-width="2" fill="none"/>
    <polygon points="230,15 225,10 225,20" fill="#475569"/>

    <rect x="240" y="0" width="80" height="30" rx="6" fill="#f59e0b"/>
    <text x="280" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">审查</text>

    <path d="M 330 15 L 350 15" stroke="#475569" stroke-width="2" fill="none"/>
    <polygon points="350,15 345,10 345,20" fill="#475569"/>

    <rect x="360" y="0" width="80" height="30" rx="6" fill="#10b981"/>
    <text x="400" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">发布</text>

    <path d="M 450 15 L 470 15" stroke="#475569" stroke-width="2" fill="none"/>
    <polygon points="470,15 465,10 465,20" fill="#475569"/>

    <rect x="480" y="0" width="80" height="30" rx="6" fill="#8b5cf6"/>
    <text x="520" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">测试</text>

    <path d="M 570 15 L 590 15" stroke="#475569" stroke-width="2" fill="none"/>
    <polygon points="590,15 585,10 585,20" fill="#475569"/>

    <rect x="600" y="0" width="80" height="30" rx="6" fill="#64748b"/>
    <text x="640" y="20" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="white">复盘</text>
  </g>

  <!-- Footer -->
  <text x="400" y="460" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">显式切换认知模式，告诉模型「现在需要你用什么脑子」</text>
  <text x="400" y="480" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#334155">gstack by Garry Tan · YC President &amp; CEO</text>
</svg>