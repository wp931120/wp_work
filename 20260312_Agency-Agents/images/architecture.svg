<svg width="100%" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="engGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#11998e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38ef7d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="designGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ee0979;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6a00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mktGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="salesGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="450" fill="#f8fafc"/>

  <!-- 标题区域 -->
  <rect x="200" y="20" width="400" height="50" rx="25" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="52" text-anchor="middle" fill="#fff" font-size="20" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">🎭 Agency-Agents 架构</text>

  <!-- 中央圆 -->
  <circle cx="400" cy="200" r="60" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="400" y="195" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">128 个</text>
  <text x="400" y="215" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">AI Agent</text>

  <!-- 工程部门 -->
  <rect x="50" y="120" width="120" height="60" rx="8" fill="url(#engGrad)" filter="url(#shadow)"/>
  <text x="110" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">💻 工程</text>
  <text x="110" y="165" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">Frontend · Backend</text>

  <!-- 设计部门 -->
  <rect x="630" y="120" width="120" height="60" rx="8" fill="url(#designGrad)" filter="url(#shadow)"/>
  <text x="690" y="145" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">🎨 设计</text>
  <text x="690" y="165" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">UI · UX · Brand</text>

  <!-- 营销部门 -->
  <rect x="50" y="260" width="120" height="60" rx="8" fill="url(#mktGrad)" filter="url(#shadow)"/>
  <text x="110" y="285" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">📢 营销</text>
  <text x="110" y="305" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">小红书 · B站</text>

  <!-- 销售部门 -->
  <rect x="630" y="260" width="120" height="60" rx="8" fill="url(#salesGrad)" filter="url(#shadow)"/>
  <text x="690" y="285" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">💼 销售</text>
  <text x="690" y="305" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">Outbound · Deal</text>

  <!-- 连接线 -->
  <line x1="170" y1="150" x2="340" y2="180" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="630" y1="150" x2="460" y2="180" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="170" y1="290" x2="340" y2="220" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>
  <line x1="630" y1="290" x2="460" y2="220" stroke="#667eea" stroke-width="2" stroke-dasharray="5,5"/>

  <!-- 其他部门标签 -->
  <rect x="300" y="320" width="200" height="35" rx="8" fill="#e2e8f0" filter="url(#shadow)"/>
  <text x="400" y="343" text-anchor="middle" fill="#475569" font-size="12" font-family="system-ui, sans-serif">游戏开发 · 空间计算 · 测试...</text>

  <!-- 底部工具支持 -->
  <rect x="150" y="390" width="500" height="40" rx="8" fill="#1e293b" filter="url(#shadow)"/>
  <text x="400" y="415" text-anchor="middle" fill="#fff" font-size="12" font-family="system-ui, sans-serif">支持 Claude Code · Cursor · Copilot · Aider · Windsurf 等 10 种工具</text>
</svg>