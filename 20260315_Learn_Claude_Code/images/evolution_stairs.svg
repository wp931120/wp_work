  <text x="600" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" fill="#6c757d">从"人工智障"到"靠谱队友"</text>

  <!-- 台阶 -->
  
    <g transform="translate(50, 450)">
