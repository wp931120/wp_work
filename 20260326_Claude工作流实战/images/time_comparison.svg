<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beforeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ee5a5a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="afterGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#40c057;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="400" fill="#f8f9fa"/>
  
  <!-- 标题 -->
  <text x="400" y="45" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="bold" fill="#212529">每周工作时间对比</text>
  
  <!-- Before 标签 -->
  <text x="200" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#868e96">使用前</text>
  
  <!-- Before 条形图 -->
  <rect x="100" y="110" width="200" height="250" rx="12" fill="url(#beforeGrad)" filter="url(#shadow)"/>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white">17h</text>
  
  <!-- After 标签 -->
  <text x="600" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#868e96">使用后</text>
  
  <!-- After 条形图 -->
  <rect x="500" y="240" width="200" height="120" rx="12" fill="url(#afterGrad)" filter="url(#shadow)"/>
  <text x="600" y="310" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="bold" fill="white">4h</text>
  
  <!-- 箭头 -->
  <path d="M320 200 L480 200" stroke="#495057" stroke-width="3" stroke-linecap="round" stroke-dasharray="10,5"/>
  <polygon points="485,200 470,193 470,207" fill="#495057"/>
  
  <!-- 节省时间标注 -->
  <rect x="340" y="160" width="120" height="36" rx="18" fill="#4dabf7"/>
  <text x="400" y="184" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">省 13h/周</text>
  
  <!-- 底部说明 -->
  <text x="400" y="385" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#868e96">每月多出 2 个工作日</text>
</svg>