<svg width="100%" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="primateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="languageGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="writingGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="550" fill="url(#bgGrad)"/>

  <!-- 标题 -->
  <text x="450" y="35" text-anchor="middle" fill="#f3f4f6" font-size="22" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    智能跃迁：从个体到社会
  </text>

  <!-- 时间线 -->
  <line x1="80" y1="280" x2="820" y2="280" stroke="#4b5563" stroke-width="2"/>

  <!-- 阶段 1：灵长类智力 -->
  <g transform="translate(80, 120)">
    <circle cx="50" cy="0" r="12" fill="url(#primateGrad)"/>
    <line x1="50" y1="12" x2="50" y2="160" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="10" y="160" width="80" height="70" rx="8" fill="url(#primateGrad)" filter="url(#shadow)"/>
    <text x="50" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">灵长类智力</text>
    <text x="50" y="205" text-anchor="middle" fill="#e9d5ff" font-size="10" font-family="system-ui, sans-serif">群体规模</text>
    <text x="50" y="220" text-anchor="middle" fill="#e9d5ff" font-size="10" font-family="system-ui, sans-serif">驱动智能</text>
  </g>

  <!-- 阶段 2：人类语言 -->
  <g transform="translate(250, 120)">
    <circle cx="50" cy="0" r="12" fill="url(#languageGrad)"/>
    <line x1="50" y1="12" x2="50" y2="160" stroke="#3b82f6" stroke-width="2"/>
    <rect x="10" y="160" width="80" height="70" rx="8" fill="url(#languageGrad)" filter="url(#shadow)"/>
    <text x="50" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">人类语言</text>
    <text x="50" y="205" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="system-ui, sans-serif">文化棘轮</text>
    <text x="50" y="220" text-anchor="middle" fill="#bfdbfe" font-size="10" font-family="system-ui, sans-serif">知识积累</text>
  </g>

  <!-- 阶段 3：文字与制度 -->
  <g transform="translate(420, 120)">
    <circle cx="50" cy="0" r="12" fill="url(#writingGrad)"/>
    <line x1="50" y1="12" x2="50" y2="160" stroke="#10b981" stroke-width="2"/>
    <rect x="5" y="160" width="90" height="70" rx="8" fill="url(#writingGrad)" filter="url(#shadow)"/>
    <text x="50" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">文字与制度</text>
    <text x="50" y="205" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">社会智能</text>
    <text x="50" y="220" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">外化基础设施</text>
  </g>

  <!-- 阶段 4：AI 大模型 -->
  <g transform="translate(600, 120)">
    <circle cx="50" cy="0" r="12" fill="url(#aiGrad)"/>
    <line x1="50" y1="12" x2="50" y2="160" stroke="#f59e0b" stroke-width="2"/>
    <rect x="10" y="160" width="80" height="70" rx="8" fill="url(#aiGrad)" filter="url(#shadow)"/>
    <text x="50" y="185" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">AI 大模型</text>
    <text x="50" y="205" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">社交认知</text>
    <text x="50" y="220" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">计算化压缩</text>
  </g>

  <!-- 箭头指向未来 -->
  <g transform="translate(750, 250)">
    <path d="M0,30 L40,30 L40,20 L60,35 L40,50 L40,40 L0,40 Z" fill="#f59e0b" opacity="0.8"/>
    <text x="30" y="70" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="system-ui, sans-serif">代理社会</text>
  </g>

  <!-- 底部说明 -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="740" height="200" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

    <!-- 核心观点标题 -->
    <text x="370" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="bold" font-family="system-ui, sans-serif">
      每一次智能跃迁的本质
    </text>

    <!-- 观点 1 -->
    <g transform="translate(30, 50)">
      <circle cx="8" cy="8" r="6" fill="#8b5cf6"/>
      <text x="25" y="12" fill="#cbd5e1" font-size="12" font-family="system-ui, sans-serif">
        不是单个认知硬件的升级
      </text>
    </g>

    <!-- 观点 2 -->
    <g transform="translate(30, 80)">
      <circle cx="8" cy="8" r="6" fill="#3b82f6"/>
      <text x="25" y="12" fill="#cbd5e1" font-size="12" font-family="system-ui, sans-serif">
        而是新的社会化认知单元的涌现
      </text>
    </g>

    <!-- 观点 3 -->
    <g transform="translate(30, 110)">
      <circle cx="8" cy="8" r="6" fill="#10b981"/>
      <text x="25" y="12" fill="#cbd5e1" font-size="12" font-family="system-ui, sans-serif">
        系统比个体更"聪明"——苏美尔书吏不懂粮食系统的宏观经济功能
      </text>
    </g>

    <!-- 观点 4 -->
    <g transform="translate(30, 140)">
      <circle cx="8" cy="8" r="6" fill="#f59e0b"/>
      <text x="25" y="12" fill="#cbd5e1" font-size="12" font-family="system-ui, sans-serif">
        下一次：数十亿人类 + 数百亿 AI 代理组成的社会网络
      </text>
    </g>

    <!-- 引用 -->
    <text x="370" y="180" text-anchor="middle" fill="#64748b" font-size="11" font-style="italic" font-family="system-ui, sans-serif">
      "没有任何智能是一座孤岛"
    </text>
  </g>
</svg>