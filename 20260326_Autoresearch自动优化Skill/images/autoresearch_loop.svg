<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="step4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" opacity="0.7"/>
    </marker>
  </defs>
  
  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="bold" fill="white">Autoresearch 自动优化循环</text>
  
  <!-- 中心圆 -->
  <circle cx="400" cy="320" r="60" fill="none" stroke="#4facfe" stroke-width="2" stroke-dasharray="5,5" opacity="0.5"/>
  <text x="400" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#4facfe">循环</text>
  
  <!-- Step 1: 改动 -->
  <circle cx="400" cy="130" r="45" fill="url(#step1)" filter="url(#glow)"/>
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Step 1</text>
  <text x="400" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">改一个小点</text>
  
  <!-- Step 2: 测试 -->
  <circle cx="580" cy="260" r="45" fill="url(#step2)" filter="url(#glow)"/>
  <text x="580" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Step 2</text>
  <text x="580" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">测试运行</text>
  
  <!-- Step 3: 评分 -->
  <circle cx="510" cy="450" r="45" fill="url(#step3)" filter="url(#glow)"/>
  <text x="510" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Step 3</text>
  <text x="510" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">Checklist 评分</text>
  
  <!-- Step 4: 决策 -->
  <circle cx="290" cy="450" r="45" fill="url(#step4)" filter="url(#glow)"/>
  <text x="290" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="white">Step 4</text>
  <text x="290" y="465" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white">保留/回退</text>
  
  <!-- 连接箭头 -->
  <!-- Step 1 → Step 2 -->
  <path d="M 435 165 Q 500 200 545 225" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Step 2 → Step 3 -->
  <path d="M 575 305 Q 560 370 520 405" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Step 3 → Step 4 -->
  <path d="M 465 450 L 335 450" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- Step 4 → Step 1 -->
  <path d="M 270 405 Q 240 280 350 160" stroke="white" stroke-width="2" fill="none" marker-end="url(#arrowhead)" opacity="0.7"/>
  
  <!-- 决策分支 -->
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#43e97b">↑ 分数上升 → 保留</text>
  <text x="400" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#f5576c">↓ 分数下降 → 回退</text>
  
  <!-- 底部公式 -->
  <rect x="150" y="560" width="500" height="30" rx="15" fill="rgba(255,255,255,0.1)"/>
  <text x="400" y="580" text-anchor="middle" font-family="monospace" font-size="12" fill="#4facfe">Autoresearch = 改一小步 + 测试 + 评分 + 决策 × N 次</text>
</svg>