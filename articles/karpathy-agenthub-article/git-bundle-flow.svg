<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#2a2a5e"/>
    </linearGradient>
    <linearGradient id="bundleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3e"/>
      <stop offset="100%" style="stop-color:#4a2a6e"/>
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1e"/>
      <stop offset="100%" style="stop-color:#2a4a2e"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto">
      <polygon points="0 0, 12 5, 0 10" fill="#00d4ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad3)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="bold" font-family="Arial, sans-serif">Git Bundle 传输机制</text>

  <!-- Step 1: Agent -->
  <rect x="40" y="80" width="180" height="120" rx="10" fill="url(#agentGrad)" stroke="#00d4ff" stroke-width="2"/>
  <text x="130" y="115" text-anchor="middle" fill="#00d4ff" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Agent</text>

  <!-- Code icon -->
  <rect x="90" y="130" width="80" height="55" rx="4" fill="#0f0f1a"/>
  <text x="130" y="150" text-anchor="middle" fill="#00ff88" font-size="10" font-family="monospace">def train():</text>
  <text x="130" y="165" text-anchor="middle" fill="#00ff88" font-size="10" font-family="monospace">  model.step()</text>
  <text x="130" y="180" text-anchor="middle" fill="#666" font-size="9" font-family="Arial, sans-serif">代码提交</text>

  <!-- Arrow to bundle -->
  <line x1="220" y1="140" x2="290" y2="140" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="255" y="130" text-anchor="middle" fill="#888" font-size="10" font-family="Arial, sans-serif">创建</text>

  <!-- Step 2: Bundle -->
  <rect x="300" y="80" width="200" height="120" rx="10" fill="url(#bundleGrad)" stroke="#a855f7" stroke-width="2"/>
  <text x="400" y="115" text-anchor="middle" fill="#a855f7" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Git Bundle</text>

  <!-- Bundle visualization -->
  <rect x="340" y="130" width="120" height="55" rx="4" fill="#1a1a2e" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="400" y="155" text-anchor="middle" fill="#e0e0e0" font-size="11" font-family="monospace">bundle.bundle</text>
  <text x="400" y="172" text-anchor="middle" fill="#888" font-size="9" font-family="Arial, sans-serif">打包的提交</text>

  <!-- Features -->
  <circle cx="325" cy="210" r="4" fill="#00ff88"/>
  <text x="335" y="215" fill="#aaa" font-size="10" font-family="Arial, sans-serif">离线友好</text>
  <circle cx="400" cy="210" r="4" fill="#00ff88"/>
  <text x="410" y="215" fill="#aaa" font-size="10" font-family="Arial, sans-serif">原子性</text>
  <circle cx="475" cy="210" r="4" fill="#00ff88"/>
  <text x="485" y="215" fill="#aaa" font-size="10" font-family="Arial, sans-serif">安全性</text>

  <!-- Arrow to server -->
  <line x1="500" y1="140" x2="570" y2="140" stroke="#00d4ff" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="535" y="130" text-anchor="middle" fill="#888" font-size="10" font-family="Arial, sans-serif">HTTP POST</text>

  <!-- Step 3: Server -->
  <rect x="580" y="80" width="180" height="120" rx="10" fill="url(#serverGrad)" stroke="#00ff88" stroke-width="2"/>
  <text x="670" y="115" text-anchor="middle" fill="#00ff88" font-size="16" font-weight="bold" font-family="Arial, sans-serif">Server</text>

  <!-- Server actions -->
  <rect x="605" y="130" width="130" height="25" rx="4" fill="#0f1a0f"/>
  <text x="670" y="147" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="Arial, sans-serif">1. 验证 Bundle</text>
  <rect x="605" y="160" width="130" height="25" rx="4" fill="#0f1a0f"/>
  <text x="670" y="177" text-anchor="middle" fill="#e0e0e0" font-size="10" font-family="Arial, sans-serif">2. Unbundle</text>

  <!-- Arrow down to repo -->
  <line x1="670" y1="200" x2="670" y2="250" stroke="#00ff88" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Bare Repo -->
  <rect x="580" y="260" width="180" height="100" rx="10" fill="#1a1a1a" stroke="#ffaa00" stroke-width="2"/>
  <text x="670" y="290" text-anchor="middle" fill="#ffaa00" font-size="14" font-weight="bold" font-family="Arial, sans-serif">Bare Git Repo</text>

  <!-- Git tree visualization -->
  <circle cx="630" cy="320" r="8" fill="#ffaa00" opacity="0.5"/>
  <circle cx="670" cy="310" r="8" fill="#ffaa00" opacity="0.7"/>
  <circle cx="710" cy="320" r="8" fill="#ffaa00" opacity="0.5"/>
  <line x1="635" y1="318" x2="665" y2="312" stroke="#ffaa00" stroke-width="1.5"/>
  <line x1="675" y1="312" x2="705" y2="318" stroke="#ffaa00" stroke-width="1.5"/>
  <text x="670" y="350" text-anchor="middle" fill="#888" font-size="10" font-family="Arial, sans-serif">DAG 存储</text>

  <!-- Bottom info -->
  <rect x="40" y="330" width="720" height="50" rx="8" fill="#0f0f1a" stroke="#333" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" fill="#aaa" font-size="12" font-family="Arial, sans-serif">核心优势：原子性传输 · 离线友好 · 可验证内容 · 简化冲突处理</text>
  <text x="400" y="370" text-anchor="middle" fill="#666" font-size="10" font-family="Arial, sans-serif">AgentHub 不使用传统 git push/pull，而是用 Git Bundle 作为传输协议</text>
</svg>
