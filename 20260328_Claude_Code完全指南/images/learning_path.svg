<svg width="100%" viewBox="0 0 900 650" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="beginnerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="intermediateGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="advancedGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="900" height="650" fill="url(#bgGrad)"/>
  
  <!-- 标题 -->
  <text x="450" y="40" text-anchor="middle" fill="#f3f4f6" font-size="26" font-weight="bold" font-family="system-ui, -apple-system, sans-serif">
    Claude Code 功能全景与学习路径
  </text>
  
  <!-- 难度标签 -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="80" height="22" rx="4" fill="url(#beginnerGrad)"/>
    <text x="40" y="15" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif">入门</text>
    
    <rect x="0" y="28" width="80" height="22" rx="4" fill="url(#intermediateGrad)"/>
    <text x="40" y="43" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif">进阶</text>
    
    <rect x="0" y="56" width="80" height="22" rx="4" fill="url(#advancedGrad)"/>
    <text x="40" y="71" text-anchor="middle" fill="#fff" font-size="11" font-family="system-ui, sans-serif">高级</text>
  </g>
  
  <!-- 中心：Claude Code -->
  <g transform="translate(450, 320)">
    <circle cx="0" cy="0" r="70" fill="url(#centerGrad)" filter="url(#shadow)"/>
    <text x="0" y="-10" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">Claude</text>
    <text x="0" y="12" text-anchor="middle" fill="#fff" font-size="18" font-weight="bold" font-family="system-ui, sans-serif">Code</text>
    <text x="0" y="35" text-anchor="middle" fill="#e9d5ff" font-size="11" font-family="system-ui, sans-serif">117 功能点</text>
  </g>
  
  <!-- 入门级模块 -->
  <!-- Slash Commands -->
  <g transform="translate(120, 130)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#beginnerGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">01</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Slash Commands</text>
    <text x="70" y="52" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">55+ 内置命令</text>
  </g>
  <line x1="260" y1="165" x2="380" y2="280" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Memory -->
  <g transform="translate(120, 220)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#beginnerGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">02</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Memory</text>
    <text x="70" y="52" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">CLAUDE.md 记忆</text>
  </g>
  <line x1="260" y1="250" x2="380" y2="300" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Checkpoints -->
  <g transform="translate(120, 310)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#beginnerGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">03</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Checkpoints</text>
    <text x="70" y="52" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">状态保存回滚</text>
  </g>
  <line x1="260" y1="340" x2="380" y2="320" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- CLI -->
  <g transform="translate(120, 400)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#beginnerGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">04</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">CLI Basics</text>
    <text x="70" y="52" text-anchor="middle" fill="#d1fae5" font-size="10" font-family="system-ui, sans-serif">命令行操作</text>
  </g>
  <line x1="260" y1="430" x2="380" y2="350" stroke="#10b981" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- 进阶级模块 -->
  <!-- Skills -->
  <g transform="translate(640, 130)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#intermediateGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">05</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Skills</text>
    <text x="70" y="52" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">自动触发技能</text>
  </g>
  <line x1="640" y1="165" x2="520" y2="280" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Hooks -->
  <g transform="translate(640, 220)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#intermediateGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">06</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Hooks</text>
    <text x="70" y="52" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">25 事件驱动</text>
  </g>
  <line x1="640" y1="250" x2="520" y2="300" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- MCP -->
  <g transform="translate(640, 310)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#intermediateGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">07</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">MCP</text>
    <text x="70" y="52" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">外部工具接入</text>
  </g>
  <line x1="640" y1="340" x2="520" y2="320" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Subagents -->
  <g transform="translate(640, 400)">
    <rect x="0" y="0" width="140" height="65" rx="8" fill="url(#intermediateGrad)" filter="url(#shadow)"/>
    <text x="70" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">08</text>
    <text x="70" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Subagents</text>
    <text x="70" y="52" text-anchor="middle" fill="#fef3c7" font-size="10" font-family="system-ui, sans-serif">专业子代理</text>
  </g>
  <line x1="640" y1="430" x2="520" y2="350" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- 高级模块 -->
  <!-- Advanced Features -->
  <g transform="translate(280, 500)">
    <rect x="0" y="0" width="160" height="65" rx="8" fill="url(#advancedGrad)" filter="url(#shadow)"/>
    <text x="80" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">09</text>
    <text x="80" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Advanced Features</text>
    <text x="80" y="52" text-anchor="middle" fill="#fecaca" font-size="10" font-family="system-ui, sans-serif">Remote/Teams/Sandbox</text>
  </g>
  <line x1="360" y1="500" x2="450" y2="390" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- Plugins -->
  <g transform="translate(460, 500)">
    <rect x="0" y="0" width="160" height="65" rx="8" fill="url(#advancedGrad)" filter="url(#shadow)"/>
    <text x="80" y="18" text-anchor="middle" fill="#fff" font-size="10" font-family="system-ui, sans-serif">10</text>
    <text x="80" y="34" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold" font-family="system-ui, sans-serif">Plugins</text>
    <text x="80" y="52" text-anchor="middle" fill="#fecaca" font-size="10" font-family="system-ui, sans-serif">功能打包分发</text>
  </g>
  <line x1="540" y1="500" x2="450" y2="390" stroke="#ef4444" stroke-width="2" stroke-dasharray="5,3" opacity="0.7"/>
  
  <!-- 底部统计 -->
  <g transform="translate(50, 590)">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="18" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">入门级</text>
    <text x="90" y="33" text-anchor="middle" fill="#10b981" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">~2 小时</text>
  </g>
  
  <g transform="translate(250, 590)">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="18" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">进阶级</text>
    <text x="90" y="33" text-anchor="middle" fill="#f59e0b" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">~4.5 小时</text>
  </g>
  
  <g transform="translate(450, 590)">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="90" y="18" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui, sans-serif">高级</text>
    <text x="90" y="33" text-anchor="middle" fill="#ef4444" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">~4 小时</text>
  </g>
  
  <g transform="translate(650, 590)">
    <rect x="0" y="0" width="180" height="40" rx="6" fill="#7c3aed" filter="url(#shadow)"/>
    <text x="90" y="18" text-anchor="middle" fill="#e9d5ff" font-size="10" font-family="system-ui, sans-serif">完整路径</text>
    <text x="90" y="33" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold" font-family="system-ui, sans-serif">11-13 小时</text>
  </g>
</svg>